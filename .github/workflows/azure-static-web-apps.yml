name: Deploy MagicTrip to Azure Static Web Apps

on:
    push:
        branches:
            - main
    pull_request:
        types: [ opened, synchronize, reopened, closed ]
        branches:
            - main

jobs:
    # ── Build & deploy (runs on push to main OR on an open/updated PR) ─────────
    build_and_deploy:
        if: github.event_name == 'push' || (github.event_name == 'pull_request' &&
            github.event.action != 'closed')
        runs-on: ubuntu-latest
        name: Build and deploy

        steps:
            - uses: actions/checkout@v4
              with:
                  submodules: true
                  lfs: false

            # ── Node.js setup ───────────────────────────────────────────────────────
            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: "npm"

            # ── Deploy to Azure Static Web Apps ────────────────────────────────────
            # Oryx handles npm install + build for both the app and the API.
            - name: Deploy to Azure Static Web Apps
              id: deploy_swa
              uses: Azure/static-web-apps-deploy@v1
              with:
                  azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
                  repo_token: ${{ secrets.GITHUB_TOKEN }}
                  action: upload
                  app_location: / # Root of the frontend app
                  api_location: api # Azure Functions folder
                  output_location: build # Vite build output

            # ── Configure Azure Static Web App settings ─────────────────────────────
            # Propagates AZURE_STORAGE_CONNECTION_STRING from GitHub Secrets to the
            # Azure Static Web App Application Settings so the Functions API can
            # read it securely at runtime (it is NEVER exposed to the browser).
            - name: Azure Login
              uses: azure/login@v2
              with:
                  creds: ${{ secrets.AZURE_CREDENTIALS }}

            - name: Set Azure Static Web App application settings
              uses: azure/CLI@v2
              with:
                  inlineScript: |
                      az staticwebapp appsettings set \
                        --name "${{ vars.AZURE_STATIC_WEB_APP_NAME }}" \
                        --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
                        --setting-names \
                          "AZURE_STORAGE_CONNECTION_STRING=${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}"

    # ── Close PR: remove staging environment ───────────────────────────────────
    close_pull_request:
        if: github.event_name == 'pull_request' && github.event.action == 'closed'
        runs-on: ubuntu-latest
        name: Close pull request staging

        steps:
            - name: Remove staging environment
              uses: Azure/static-web-apps-deploy@v1
              with:
                  azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
                  action: close
                  app_location: /
